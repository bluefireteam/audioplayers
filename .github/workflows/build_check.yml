name: Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: "Analyse, Formatage & Tests Unitaires"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: "Initialisation (Get Dependencies)"
        run: flutter pub get

      - name: "Vérification Formatage"
        run: dart format --output=none --set-exit-if-changed .

      - name: "Analyse Statique (Linter)"
        run: flutter analyze .

  android-build:
    name: "Android (APK Build Check)"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: "Build APK (Release)"
        working-directory: packages/audioplayers/example
        run: flutter build apk --release

  linux-build:
    name: "Linux (Build Check)"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Installation Dépendances Linux"
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: "Enable Linux"
        run: flutter config --enable-linux-desktop
      - name: "Build Linux (Release)"
        working-directory: packages/audioplayers/example
        run: flutter build linux --release

  windows-build:
    name: "Windows (Build Check)"
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: "Enable Windows"
        run: flutter config --enable-windows-desktop
      - name: "Build Windows (Release)"
        working-directory: packages/audioplayers/example
        run: flutter build windows --release
