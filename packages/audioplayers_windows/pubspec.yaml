name: audioplayers_windows
resolution: workspace
publish_to: none
description: Windows implementation of audioplayers, a Flutter plugin to play multiple audio files simultaneously
version: 4.3.1
homepage: https://github.com/Sebastien-VZN/audioplayers
repository: https://github.com/Sebastien-VZN/audioplayers/tree/main/packages/audioplayers_windows

flutter:
  plugin:
    implements: audioplayers
    platforms:
      windows:
        pluginClass: AudioplayersWindowsPlugin

dependencies:
  audioplayers_platform_interface:
    path: ../audioplayers_platform_interface
  flutter:
    sdk: flutter

dev_dependencies:
  flame_lint: ^1.4.1
  flutter_test:
    sdk: flutter

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'
