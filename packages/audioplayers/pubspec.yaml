name: audioplayers
resolution: workspace
publish_to: none
description: A Flutter plugin to play multiple audio files simultaneously
version: 6.6.2
homepage: https://github.com/Sebastien-VZN/audioplayers
repository: https://github.com/Sebastien-VZN/audioplayers/tree/main/packages/audioplayers

flutter:
  plugin:
    platforms:
      android:
        default_package: audioplayers_android
      ios:
        default_package: audioplayers_darwin
      linux:
        default_package: audioplayers_linux
      macos:
        default_package: audioplayers_darwin
      web:
        default_package: audioplayers_web
      windows:
        default_package: audioplayers_windows

dependencies:
  audioplayers_android:
    path: ../audioplayers_android
  audioplayers_darwin:
    path: ../audioplayers_darwin
  audioplayers_linux:
    path: ../audioplayers_linux
  audioplayers_platform_interface:
    path: ../audioplayers_platform_interface
  audioplayers_web:
    path: ../audioplayers_web
  audioplayers_windows:
    path: ../audioplayers_windows
  file: '>=6.1.0 <8.0.0'
  flutter:
    sdk: flutter
  http: '>=0.13.1 <2.0.0'
  meta: ^1.7.0
  path_provider: ^2.0.12
  plugin_platform_interface: ^2.1.8
  synchronized: ^3.0.0
  uuid: '>=3.0.7 <5.0.0'

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

topics:
  - audio
  - audio-player
